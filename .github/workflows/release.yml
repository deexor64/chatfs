name: Build & Release

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: chatfs-linux-x86_64
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            name: chatfs-macos-x86_64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: chatfs-windows-x86_64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/chatfs dist/chatfs
          tar -czf ${{ matrix.name }}.tar.gz -C dist chatfs

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          copy target\${{ matrix.target }}\release\chatfs.exe dist\chatfs.exe
          copy dist\chatfs.exe ${{ matrix.name }}.exe

      - name: Generate checksum (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          sha256sum ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.sha256

      - name: Generate checksum (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          sha256sum ${{ matrix.name }}.exe > ${{ matrix.name }}.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            *.tar.gz
            *.exe
            *.sha256

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4

      - name: Combine checksums
        run: |
          cat **/*.sha256 > checksums.txt

      - name: Determine prerelease flag
        id: pre
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"

          # strip leading "v"
          VERSION="${TAG#v}"

          # extract major version
          MAJOR=$(echo "$VERSION" | cut -d. -f1)

          if [ "$MAJOR" -lt 1 ]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          prerelease: ${{ steps.pre.outputs.prerelease }}
          files: |
            **/*.tar.gz
            **/*.exe
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
