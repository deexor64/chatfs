name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: chatfs-linux-x86_64
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            name: chatfs-macos-x86_64
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: chatfs-windows-x86_64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/chatfs dist/chatfs
          tar -czf ${{ matrix.name }}.tar.gz -C dist chatfs

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          mkdir dist
          copy target\${{ matrix.target }}\release\chatfs.exe dist\chatfs.exe
          copy dist\chatfs.exe ${{ matrix.name }}.exe

      - name: Generate checksum
        shell: bash
        run: |
          if [ -f "${{ matrix.name }}.tar.gz" ]; then
            sha256sum ${{ matrix.name }}.tar.gz > ${{ matrix.name }}.sha256
          else
            sha256sum ${{ matrix.name }}.exe > ${{ matrix.name }}.sha256
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            *.tar.gz
            *.exe
            *.sha256

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4

      - name: Combine checksums
        run: |
          cat **/*.sha256 > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.tar.gz
            **/*.exe
            checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
